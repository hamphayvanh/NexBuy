<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password - NexBuy</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: Arial, sans-serif; background: #f8f9fa; margin: 0; padding: 20px; }
    .header { background: linear-gradient(135deg, #0078ff, #003087); color: white; padding: 20px; text-align: center; font-size: 20px; margin: -20px -20px 30px; }
    .form { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    input { width: 100%; padding: 14px; margin: 12px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
    button { width: 100%; padding: 16px; background: #0078ff; color: white; border: none; border-radius: 10px; font-size: 17px; margin-top: 20px; }
  </style>
</head>
<body>

  <div class="header">Change Password</div>

  <div class="form">
    <label>CURRENT PASSWORD</label>
    <input type="password" placeholder="Enter current password">
    
    <label>NEW PASSWORD</label>
    <input type="password" placeholder="Enter new password">
    
    <label>CONFIRM NEW PASSWORD</label>
    <input type="password" placeholder="Confirm new password">
    
    <button onclick="savePassword()">SAVE</button>
  </div>

  <script>
    function savePassword() {
      alert("✅ Password Changed Successfully!");
      window.history.back();
    }
  </script>
</body>
</html>
