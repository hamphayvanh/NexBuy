<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Start - NexBuy</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: Arial, sans-serif; background: #f8f9fa; margin: 0; padding-bottom: 80px; }
    .header { background: #003087; color: white; padding: 15px; text-align: center; font-size: 21px; font-weight: bold; }
    .current-product { text-align: center; margin: 20px 15px; background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .current-product img { width: 100%; max-height: 220px; object-fit: cover; border-radius: 12px; }
    .big-button { 
      background: #0078ff; 
      color: white; 
      padding: 18px; 
      margin: 15px; 
      border-radius: 12px; 
      text-align: center; 
      font-size: 19px; 
      font-weight: bold; 
      cursor: pointer; 
    }
    .popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
    .popup-content { background: white; width: 92%; max-width: 380px; border-radius: 16px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; box-shadow: 0 -3px 10px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <div class="header">START</div>

  <div class="current-product" id="currentProduct">
    <img id="currentImg" src="">
    <div id="currentName" style="font-weight:600; margin-top:10px; font-size:16px;"></div>
  </div>

  <div class="big-button" onclick="grabOrder()">
    START GETTING ORGANIZED
  </div>

  <div class="vip-info" id="vipInfo" style="margin:15px; padding:15px; background:white; border-radius:12px; box-shadow:0 3px 10px rgba(0,0,0,0.1);">
    <strong>VIP0</strong> (Deposit 0)<br>
    <small>DAILY ORDERS: 38 | COMMISSION RATE: 1%</small>
  </div>

  <!-- Grab Order Popup -->
  <div class="popup" id="grabPopup">
    <div class="popup-content">
      <div style="text-align:right; cursor:pointer; font-size:28px;" onclick="closePopup()">×</div>
      <h3>GRAB ORDER</h3>
      <p><strong>ORDER ID:</strong> <span id="orderId"></span></p>
      
      <div style="display:flex; gap:15px; background:#f8f9fa; padding:12px; border-radius:10px;">
        <img id="popupImg" style="width:80px; height:80px; border-radius:8px; object-fit:cover;">
        <strong id="popupName" style="flex:1; margin-top:5px;"></strong>
      </div>

      <div style="margin-top:20px; line-height:2.2;">
        <div><strong>UNIT PRICE:</strong> <span id="unitPrice" style="float:right;"></span></div>
        <div><strong>ORDER QUANTITY:</strong> <span style="float:right;">1</span></div>
        <hr>
        <div><strong>TOTAL:</strong> <span id="totalPrice" style="float:right; color:#0078ff; font-weight:bold;"></span></div>
        <div><strong style="color:#e74c3c;">ORDER COMMISSION</strong> <span id="commission" style="float:right; color:#e74c3c; font-weight:bold;"></span></div>
      </div>

      <textarea placeholder="Add note here..." style="width:100%; height:80px; margin:15px 0; padding:10px; border:1px solid #ddd; border-radius:8px; resize:none;"></textarea>

      <button onclick="confirmOrder()" style="width:100%; padding:16px; background:#0078ff; color:white; border:none; border-radius:10px; font-size:17px;">
        SEND ORDER
      </button>
    </div>
  </div>

  <div class="bottom-nav">
    <a href="index.html">🏠<br>Home</a>
    <a href="order.html">📋<br>Order</a>
    <a href="start.html" class="nav-item active">✅<br>Start</a>
    <a href="service.html">🎧<br>Service</a>
    <a href="account.html">👤<br>Account</a>
  </div>

  <script>
    let userVIP = JSON.parse(localStorage.getItem('userVIP')) || { level: 0, daily: 38, rate: 0.01 };
    let currentProduct = null;

    const products = [
      { name: "TOMEI DRAGON PENDANT, YELLOW GOLD 916", price: 239, img: "https://picsum.photos/id/64/600/400" },
      { name: "VINTAGE & PRELOVED GOLD JEWELRY", price: 182, img: "https://picsum.photos/id/201/600/400" },
      { name: "VERSACE COASTER 4 PACK", price: 230, img: "https://picsum.photos/id/301/600/400" },
      { name: "VERSACE BOWL WITH FOOT", price: 258, img: "https://picsum.photos/id/180/600/400" },
      { name: "WOMEN SUMMER WEAR", price: 189, img: "https://picsum.photos/id/1015/600/400" },
      { name: "NO. 5 BY CHANEL", price: 124, img: "https://picsum.photos/id/133/600/400" },
      { name: "SHORT SLEEVE SHORT DRESS", price: 126, img: "https://picsum.photos/id/64/600/400" },
      { name: "FOSSIL WOMEN'S JOLIE BAG", price: 240, img: "https://picsum.photos/id/251/600/400" }
    ];

    function loadCurrentProduct() {
      currentProduct = products[Math.floor(Math.random() * products.length)];
      document.getElementById('currentImg').src = currentProduct.img;
      document.getElementById('currentName').textContent = currentProduct.name;
    }

    function grabOrder() {
      // Pick a different product for the order popup
      let orderProduct = products[Math.floor(Math.random() * products.length)];
      while (orderProduct === currentProduct) {
        orderProduct = products[Math.floor(Math.random() * products.length)];
      }
      currentProduct = orderProduct;

      document.getElementById('popupName').textContent = currentProduct.name;
      document.getElementById('popupImg').src = currentProduct.img;
      document.getElementById('unitPrice').textContent = '$' + currentProduct.price;
      document.getElementById('totalPrice').textContent = '$' + currentProduct.price;
      document.getElementById('commission').textContent = '+$' + (currentProduct.price * userVIP.rate).toFixed(2);
      document.getElementById('orderId').textContent = 'NEX-' + Math.floor(100000 + Math.random() * 900000);
      document.getElementById('grabPopup').style.display = 'flex';
    }

    function confirmOrder() {
      let balance = parseFloat(localStorage.getItem('balance') || 0);
      if (balance < currentProduct.price) {
        alert(`❌ Insufficient balance! You need at least $${currentProduct.price}`);
        return;
      }
      alert(`✅ Order Completed!\nCommission Earned: $${(currentProduct.price * userVIP.rate).toFixed(2)}`);
      document.getElementById('grabPopup').style.display = 'none';
      loadCurrentProduct(); // Change the main screen product
    }

    function closePopup() {
      document.getElementById('grabPopup').style.display = 'none';
    }

    window.onload = () => {
      loadCurrentProduct();
    };
  </script>
</body>
</html>
