<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - NexBuy</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #003087, #001f5c);
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: white;
      padding: 40px 30px;
      border-radius: 16px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
      text-align: center;
    }
    input {
      width: 100%;
      padding: 14px;
      margin: 12px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 15px;
      background: #0078ff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }
    .link {
      color: #0078ff;
      cursor: pointer;
      margin-top: 15px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>NexBuy Admin Login</h2>
    <p style="color:#666;">Secure Access</p>

    <input type="password" id="adminPass" placeholder="Enter Admin Password" />
    <button onclick="adminLogin()">Login to Dashboard</button>

    <div class="link" onclick="forgotPassword()">Forgot Password? Reset</div>
    <p style="margin-top:20px; font-size:13px; color:#666;">
      Default Password: <strong>admin123</strong>
    </p>
  </div>

  <script>
    function adminLogin() {
      const pass = document.getElementById('adminPass').value;
      const savedPass = localStorage.getItem('adminPassword') || 'admin123';

      if (pass === savedPass) {
        localStorage.setItem('adminLoggedIn', 'true');
        alert("✅ Login Successful!");
        window.location.href = 'admin.html';
      } else {
        alert("❌ Wrong Password!");
      }
    }

    function forgotPassword() {
      const newPass = prompt("Enter NEW Admin Password:");
      if (newPass && newPass.length >= 4) {
        localStorage.setItem('adminPassword', newPass);
        alert("✅ Password Changed Successfully!\nNew Password: " + newPass);
      } else {
        alert("Password must be at least 4 characters.");
      }
    }

    // Allow Enter key
    document.getElementById('adminPass').addEventListener("keypress", function(e) {
      if (e.key === "Enter") adminLogin();
    });
  </script>
</body>
</html>
